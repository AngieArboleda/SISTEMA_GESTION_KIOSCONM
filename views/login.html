<div class="login-container">

    <h2>KIOSCONM</h2>

    <form id="loginForm">

        <div>
            <label>Usuario</label>
            <input
                type="text"
                id="usuario"
                required
            >
        </div>

        <div>
            <label>Contraseña</label>
            <input
                type="password"
                id="password"
                required
            >
        </div>

        <button type="submit">
            Ingresar
        </button>

    </form>

</div>
